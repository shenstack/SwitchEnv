name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 安装 Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: 安装 npm 依赖
        run: npm ci

      - name: TypeScript 类型检查
        run: npm run typecheck

      - name: 前端构建（Vite）
        run: npm run build

  backend:
    name: Backend Checks
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Linux 安装 Tauri 系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 创建前端 dist 占位（避免 cargo 检查时因 build.rs 报错）
        run: mkdir -p dist

      - name: Rust 代码格式检查
        working-directory: ./src-tauri
        run: cargo fmt --check

      - name: Rust Clippy lint 检查
        working-directory: ./src-tauri
        run: cargo clippy -- -D warnings

      - name: Rust 编译检查
        working-directory: ./src-tauri
        run: cargo check

      - name: Rust 单元测试
        working-directory: ./src-tauri
        run: cargo test
